spring:
  datasource:
    url: jdbc:h2:mem:contentcrm;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

app:
  time-zone: Europe/Moscow
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret
    expiration-minutes: 1440
  files:
    upload-dir: ${java.io.tmpdir}/content-crm-test-uploads
    max-size-mb: 20
  scheduler:
    publication-fixed-delay-ms: 60000
  cors:
    allowed-origins: http://localhost:5173
