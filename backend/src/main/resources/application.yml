spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/content_crm}
    username: ${SPRING_DATASOURCE_USERNAME:content_crm}
    password: ${SPRING_DATASOURCE_PASSWORD:content_crm}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: ${APP_FILES_MAX_SIZE:20MB}
      max-request-size: ${APP_FILES_MAX_SIZE:20MB}

server:
  port: ${SERVER_PORT:8080}

app:
  time-zone: ${APP_TIME_ZONE:Europe/Moscow}
  jwt:
    secret: ${APP_JWT_SECRET:local-dev-secret-local-dev-secret-local-dev-secret}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:1440}
  files:
    upload-dir: ${APP_UPLOAD_DIR:./uploads}
    max-size-mb: ${APP_FILES_MAX_SIZE_MB:20}
  scheduler:
    publication-fixed-delay-ms: ${APP_PUBLICATION_FIXED_DELAY_MS:60000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
