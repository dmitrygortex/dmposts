services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: content_crm
      POSTGRES_USER: content_crm
      POSTGRES_PASSWORD: content_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U content_crm -d content_crm"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/content_crm
      SPRING_DATASOURCE_USERNAME: content_crm
      SPRING_DATASOURCE_PASSWORD: content_crm
      APP_JWT_SECRET: diploma-local-secret-diploma-local-secret-diploma-local-secret
      APP_UPLOAD_DIR: /app/uploads
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      APP_TIME_ZONE: Europe/Moscow
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
